name: Validate Pipeline Scripts

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile-check all scripts
        run: |
          python -m py_compile scripts/generate_luau.py
          python -m py_compile scripts/generate_luau_openai.py
          python -m py_compile scripts/generate_3d_asset.py
          python -m py_compile scripts/batch_generate_assets.py
          python -m py_compile scripts/upload_asset.py

      - name: Dry-run test for generate_luau.py
        run: python scripts/generate_luau.py "Create a basic coin collection system" --dry-run
